<!DOCTYPE html>
<html lang="en">
 <head> 
  <title>获取用户验证码5.0</title> 
  <meta charset="UTF-8" /> 
  <meta name="viewport" content="width=device-width, initial-scale=1" /> 
  <style>
        #page-content {
            width: 100%;
            height: 100%;
        }
        
        #result {
            font-size: 1.2em;
            color: red;
        }
        #result2 {
            font-size: 1.2em;
            color: red;
        }
    </style> 
  <style type="text/css">
        #footer {
                height: 40px;
                line-height: 40px;
                position: fixed;
                bottom: 0;
                width: 100%;
                text-align: center;
                background: #333;
                color: #fff;
                font-family: Arial;
                font-size: 12px;
                letter-spacing: 1px;
            }
    </style> 
  <script type="text/javascript" src="/static/clipboard.min.js"></script> 
  <script type="text/javascript" src="/static/jquery.min.js"></script> 
 </head> 
 <body> 
  <article id="page-content"> 
   <section style="text-align: center"> 
    <header> 
     <h1>♥请输入手机号，获取最新的验证码/短信♥</h1> 
    </header> 
    <input style="width: 100px;" id="mobile_number" name="mobile" type="text" onkeyup="value=value.replace(/[^\d]/g,'')" maxlength="11" /> 
    <input type="radio" name="project" value="credit" checked="" />信贷 
    <button type="button" id="submit">查验证码</button> 
    <button type="button" id="submit1">查短信</button> 
    <button class="btn" data-clipboard-action="copy" data-clipboard-target="#result">复制内容</button> 
    <p id="result"></p> 
   </section> 
   <br />   <br /> 
  
   <br />    <br /> 
   <section style="text-align: center">
    
    <h1>♥根据订单号，修改订单登录手机号♥</h1> 
     订单号：
    <input style="width: 170px;" id="orderid" name="orderid" type="text" /> 
    <button type="button" id="submit3">查手机</button> 
    <input style="width: 100px;" id="mobile2" name="mobile2" type="text" /> 
    <button type="button" id="submit4">修改手机</button> 
    <p id="result2"></p> 

   <div id="footer">
    CopyRight@qiujianzhong
   </div>  
   <script>
    var clipboard = new ClipboardJS('.btn');

    clipboard.on('success', function(e) {
        console.log(e);
       
    });

    clipboard.on('error', function(e) {
        console.log(e);
    });
</script> 
   <script>
    $(document).ready(function() {
        var URL = "";
        $('#submit').click(function() {
            doVerify();
        });

        $('#submit1').click(function() {
            doSms();
        });

        $('#submit3').click(function() {
            getmobile();
        });

        $('#submit4').click(function() {
            setmobile();
        });

      
        function doVerify() {

         if ($('#mobile_number').val().length!=11)
        {
            $('#result').text("请输入正确的手机号码");
            $('#mobile_number').focus();
            return false;
        }else{
            $('#result').text("");
        }
            $.ajax({
                type: "GET",
                url: URL + "/code",
                data: {
                    "mobile": $('#mobile_number').val(),
                    "project": $('input[name=project]:checked').val()
        },
                success: function(data) {
                    $('#result').text(data);
                   
                    if (data.length == 0) {
                        data = "无法查询到该验证码，请确认后重试！";
                    }
                    else{
                        data = data;
                    }
                    $('#result').text(data); 
                },
                error: function() {
                    $('#result').text("无法连接网络，请联系网络管理员！");
                }
            });
        }

        function doSms() {
             if ($('#mobile_number').val().length!=11)
        {
            $('#result').text("请输入正确的手机号码");
            $('#mobile_number').focus();
            return false;
        }else{
            $('#result').text("");
        }
            $.ajax({
                type: "GET",
                url: URL + "/sms",
                data: {
                    "mobile": $('#mobile_number').val(),
                    "project": $('input[name=project]:checked').val()
        },
                success: function(data) {
                    $('#result').text(data);
                   
                    if (data.length == 0) {
                        data = "无法查询到该验证码，请确认后重试！";
                    }
                    else{
                        data = data;
                    }
                    $('#result').text(data); 
                },
                error: function() {
                    $('#result').text("无法连接网络，请联系网络管理员！");
                }
            });
        }

        function getmobile() {
        if ($('#orderid').val().length<15)
        {
            $('#result2').text("请输入正确的订单号");
            $('#orderid').focus();
            return false;
        }else{
            $('#result2').text("");
        }
            $.ajax({
                type: "GET",
                url: URL + "/getmobile",
                data: {
                    "orderid": $('#orderid').val(),
        },
                success: function(data) {
                    $("#mobile2").attr("value",data);
                   
                    if (data.length == 0) {
                        data = "无法查询到该订单";
                    }
                    else{
                        data = data;
                    }

                    
                    $("#mobile2").attr("value",data);
                },
                error: function() {
                    $('#result2').text("无法连接网络！");
                }
            });
        }

          function setmobile() {
          if ($('#orderid').val().length<15)
        {
            $('#result2').text("请输入正确的订单号");
            $('#orderid').focus();
            return false;
        }else{
            $('#result2').text("");
        }
              if ($('#mobile2').val().length!=11)
        {
            $('#result2').text("请输入正确的手机号码");
            $('#mobile2').focus();
            return false;
        }else{
            $('#result2').text("");
        }

            $.ajax({
                type: "GET",
                url: URL + "/setmobile",
                data: {
                    "orderid": $('#orderid').val(),
                    "mobile": $('#mobile2').val(),
        },
                success: function(data) {
                    $('#result2').text(data);
                   
                    if (data.length == 0) {
                        data = "无法修改，请确认后重试！";
                    }
                    else{
                        data = data;
                    }
                    $('#result2').text(data); 
                },
                error: function() {
                    $('#result').text("无法连接网络，请联系网络管理员！");
                }
            });
        }

    });


    </script> 
 </body>
</html>
